# =============================================================================
# .tmux.conf — Go / Vim / Claude Code dev environment
# =============================================================================

# --- Prefix -------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Core behaviour -----------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true colour for vim themes
set -g escape-time 10           # critical for vim: near-zero esc delay
set -g repeat-time 600
set -g focus-events on          # lets vim autoread fire on pane focus
set -g history-limit 50000
set -sg exit-empty off          # keep server alive when last window closes

# --- Mouse --------------------------------------------------------------------
set -g mouse on

# --- Numbering ----------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Status bar ---------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#45475a]│ "
set -g status-right "#[fg=#a6e3a1]#{?pane_synchronized, SYNC ,}#[fg=#45475a]#{host} #[fg=#45475a]│ #[fg=#cdd6f4]%H:%M"

setw -g window-status-format         "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold,bg=#313244] #I:#W #[bg=#1e1e2e]"

# --- Pane borders -------------------------------------------------------------
set -g pane-border-style        "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# --- Navigation — vim-style ---------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching with awareness of vim splits (needs vim-tmux-navigator
# in vim; works fine without it — just falls back to normal switching)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# --- Splits -------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# --- Resize -------------------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) -----------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"
bind -T copy-mode-vi Escape send -X cancel

# --- Session persistence (tmux-resurrect + tmux-continuum) -------------------
# Install via TPM:  https://github.com/tmux-plugins/tpm
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then hit  prefix + I  to install plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @resurrect-strategy-vim 'session'   # restore vim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'             # auto-restore on server start
set -g @continuum-save-interval '5'        # save every 5 minutes

# Must be last line
run '~/.tmux/plugins/tpm/tpm'
